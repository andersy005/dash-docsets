name: CI
on:
  push:
    branches:
      - "main"
  schedule:
    - cron: "0 0 * * 6" # “At 00:00 on Wednesday and Saturday"
  workflow_dispatch: # allows you to trigger manually'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_TAG: docsets-latest
  DOCSET_BASE_URL: https://github.com/${{ github.repository }}/releases/download/docsets-latest
  FEED_ROOT_URL: https://github.com/${{ github.repository }}/releases/download/docsets-latest

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip-ci]') }}
    name: dash-docsets-build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    env:
      MKL_THREADING_LAYER: GNU

    strategy:
      fail-fast: false
      matrix:
        key: ["arctic", "pacific"]
        #, , "indian"]

    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true

      - run: |
          pixi --version
          pixi list

      - run: |
          pixi run python builder.py build configs/${{ matrix.key }}.yaml --docset-base-url "${DOCSET_BASE_URL}"

      - uses: actions/upload-artifact@v7
        with:
          name: docsets-${{ matrix.key }}
          path: docsets/*.tar.gz
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          name: feeds-${{ matrix.key }}
          path: feeds/*.xml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: dash-docsets-publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: docsets-*
          path: /tmp/workspace/builds
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: feeds-*
          path: /tmp/workspace/builds
          merge-multiple: true

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p /tmp/workspace/final/docsets /tmp/workspace/final/feeds
          find /tmp/workspace/builds -type f -name '*.tar.gz' -exec cp {} /tmp/workspace/final/docsets/ \;
          find /tmp/workspace/builds -type f -name '*.xml' -exec cp {} /tmp/workspace/final/feeds/ \;

          docset_count="$(find /tmp/workspace/final/docsets -type f -name '*.tar.gz' | wc -l | tr -d ' ')"
          feed_count="$(find /tmp/workspace/final/feeds -type f -name '*.xml' | wc -l | tr -d ' ')"
          echo "Found ${docset_count} docsets and ${feed_count} feeds"
          test "${docset_count}" -gt 0
          test "${feed_count}" -gt 0

      - name: Build feed list README
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          feed_root_url = os.environ["FEED_ROOT_URL"].rstrip("/")
          docset_dir = Path("/tmp/workspace/final/docsets")
          readme = Path("/tmp/workspace/final/feeds/README.md")

          rows = []
          for docset in sorted(docset_dir.glob("*.tar.gz")):
              name = docset.name.removesuffix(".tar.gz")
              rows.append(
                  {
                      "name": name,
                      "feed_url": f"{feed_root_url}/{name}.xml",
                      "size_mb": docset.stat().st_size / (1024 * 1024),
                  }
              )

          with readme.open("w", encoding="utf-8") as fpt:
              fpt.write(
                  "# Docset Feeds\n\n"
                  "You can subscribe to the following feeds with a single click.\n\n"
                  "```bash\n"
                  "dash-feed://<URL encoded feed URL>\n"
                  "```\n\n"
                  f"Release tag: `{os.environ['RELEASE_TAG']}`\n\n"
              )
              fpt.write("| Name | Feed URL | Size |\n")
              fpt.write("| --- | --- | --- |\n")
              for row in rows:
                  fpt.write(
                      f"| {row['name']} | {row['feed_url']} | {row['size_mb']:.1f} MB |\n"
                  )
          PY

      - name: Create or update rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          repo="${GITHUB_REPOSITORY}"
          title="Dash docsets (latest)"
          notes="Autogenerated from ${GITHUB_SHA} on $(date -u +'%Y-%m-%d %H:%M UTC')."

          if gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            for asset_id in $(gh api "repos/${repo}/releases/tags/${tag}" --jq '.assets[].id'); do
              gh api --method DELETE "repos/${repo}/releases/assets/${asset_id}"
            done
            gh release edit "${tag}" --repo "${repo}" --title "${title}" --notes "${notes}"
          else
            gh release create "${tag}" --repo "${repo}" --title "${title}" --notes "${notes}"
          fi

          gh release upload "${tag}" \
            /tmp/workspace/final/docsets/*.tar.gz \
            /tmp/workspace/final/feeds/* \
            --repo "${repo}" \
            --clobber
