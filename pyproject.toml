
[tool.ruff]
    builtins = ["ellipsis"]
    exclude = [
        ".bzr",
        ".direnv",
        ".eggs",
        ".git",
        ".git-rewrite",
        ".hg",
        ".ipynb_checkpoints",
        ".mypy_cache",
        ".nox",
        ".pants.d",
        ".pyenv",
        ".pytest_cache",
        ".pytype",
        ".ruff_cache",
        ".svn",
        ".tox",
        ".venv",
        ".vscode",
        "__pypackages__",
        "_build",
        "buck-out",
        "build",
        "dist",
        "node_modules",
        "site-packages",
        "venv",
    ]
    extend-include = ["*.ipynb"]
    line-length = 100
    target-version = "py313"

[tool.ruff.lint]
    ignore = [
        "E501", # Conflicts with ruff format
        "E721", # Comparing types instead of isinstance
        "E741", # Ambiguous variable names
    ]
    per-file-ignores = {}
    select = ["E", "F", "I", "UP", "W"]

[tool.ruff.lint.mccabe]
    max-complexity = 18

[tool.ruff.lint.isort]
    combine-as-imports = true
    known-first-party  = []

[tool.ruff.format]
    docstring-code-format = true
    quote-style           = "single"

[tool.ruff.lint.pydocstyle]
    convention = "numpy"

[tool.ruff.lint.pyupgrade]
    keep-runtime-typing = true

[tool.pixi.workspace]
    channels  = ["conda-forge"]
    name      = "dash-docsets"
    platforms = ["linux-64", "osx-arm64"]

[tool.pixi.dependencies]
    "beautifulsoup4" = ">=4.14.3"
    "doc2dash" = ">=3.1.0"
    "pandas" = ">=3.0.2"
    "pip" = ">=26.0.1"
    "psutil" = ">=7.2.2"
    "pydantic" = ">=2.12.5"
    "python" = ">=3.13,<3.14"
    "rich" = ">=14.3.3"
    "ruamel.yaml" = ">=0.19.1"
    "typer" = ">=0.23.1"

[tool.pixi.tasks]
    build-docsets    = "python builder.py build"
    update-feed-list = "python builder.py update-feed-list"
