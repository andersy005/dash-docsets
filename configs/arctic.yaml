- name: dask
  repo: dask/dask
  doc_dir: docs
  html_pages_dir: build/html
  doc_build_cmd: sphinx-build -T -b html ./source build/html
  pixi_dependencies:
    sphinx: ">=8,<9"
    dask-sphinx-theme: ">=4"
    numpydoc: "*"
    sphinx-autosummary-accessors: "*"
    sphinx-click: "*"
    sphinx-copybutton: "*"
    sphinx-design: "*"
    sphinx-remove-toctrees: "*"
    sphinx-tabs: "*"
    jupyter-sphinx: "*"
    setuptools: "<81"

