- name: dask
  repo: dask/dask
  doc_dir: docs
  html_pages_dir: build/html
  doc_build_cmd: sphinx-build -T -b html ./source build/html
  pixi_dependencies:
    sphinx: ">=8,<9"
    numpydoc: "*"
    sphinx-autosummary-accessors: "*"
    setuptools: "<81"
    dask-sphinx-theme: ">=4"
    sphinx-click: "*"
    sphinx-copybutton: "*"
    sphinx-remove-toctrees: "*"
    sphinx-tabs: "*"
    sphinx-design: "*"
    jupyter-sphinx: "*"
- name: distributed
  repo: dask/distributed
  doc_dir: docs
  html_pages_dir: build/html
  doc_build_cmd: sphinx-build -T -b html ./source build/html
  pixi_dependencies:
    sphinx: ">=8,<9"
    numpydoc: "*"
    dask-sphinx-theme: ">=4"
    sphinx-click: "*"
    sphinx-design: "*"
