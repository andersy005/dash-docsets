- name: dask
  repo: dask/dask
  doc_dir: .
  html_pages_dir: docs/build/html
  doc_build_cmd: "uv venv && uv pip install -r docs/requirements-docs.txt -e . && uv run sphinx-build -T -b html docs/source docs/build/html"
  use_own_env: true
  install: false

- name: distributed
  repo: dask/distributed
  doc_dir: .
  html_pages_dir: docs/build/html
  doc_build_cmd: "uv venv && uv pip install -r docs/requirements.txt -e . && uv run sphinx-build -T -b html docs/source docs/build/html"
  use_own_env: true
  install: false

- name: xarray
  repo: pydata/xarray
  doc_dir: "."
  html_pages_dir: doc/_build/html
  doc_build_cmd: pixi run --environment doc doc
  use_own_env: true
  install: false

- name: pint-xarray
  repo: xarray-contrib/pint-xarray
  doc_dir: "."
  html_pages_dir: docs/_build
  doc_build_cmd: "cd docs && pixi run --environment docs python -m sphinx -b html -T . _build"
  use_own_env: true
  install: false

- name: cf-xarray
  repo: xarray-contrib/cf-xarray
  doc_dir: .
  html_pages_dir: doc/_build/html
  doc_build_cmd: "uv sync --group docs && uv run sphinx-build -T -E -b html doc doc/_build/html"
  use_own_env: true
  install: false

- name: cartopy
  repo: SciTools/cartopy
  doc_dir: docs
  html_pages_dir: build/html
  doc_build_cmd: sphinx-build -T -b html ./source build/html
  pixi_dependencies:
    sphinx: ">=8,<9"
    pydata-sphinx-theme: "*"
    sphinx-copybutton: "*"
    sphinx-gallery: "*"
    matplotlib-base: "*"
    scipy: "*"
    owslib: "*"

- name: numba
  repo: numba/numba
  doc_dir: docs
  html_pages_dir: build/html
  doc_build_cmd: sphinx-build -T -b html ./source build/html
  install: false
  pixi_dependencies:
    sphinx: ">=8,<9"
    sphinx-rtd-theme: "*"
    numpydoc: "*"
    numba: "*"
    numpy: "*"

- name: numcodecs
  repo: zarr-developers/numcodecs
  doc_dir: docs
  html_pages_dir: _build/html
  doc_build_cmd: sphinx-build -T -E -b html ./ _build/html
  pip_install_cmd: "pip install .[docs] --no-build-isolation"
  pixi_dependencies:
    sphinx: ">=8,<9"
    pydata-sphinx-theme: "*"
    numpydoc: "*"
    sphinx-issues: "*"
    myst-parser: "*"
    ninja: "*"
    numpy: "*"
    cython: "*"
    meson-python: "*"

- name: icechunk
  repo: earth-mover/icechunk
  doc_dir: icechunk-python/docs
  html_pages_dir: .site
  doc_build_cmd: mkdocs build
  install: false
  generator: html2dash
  pixi_dependencies:
    mkdocs: ">=1.6,<2"
    mkdocs-material: "*"
    mkdocs-redirects: "*"
    mkdocstrings: "*"
    mkdocstrings-python: "*"
    mkdocs-jupyter: "*"
    mkdocs-git-revision-date-localized-plugin: "*"
    mkdocs-mermaid2-plugin: "*"
    mkdocs-include-markdown-plugin: "*"
    markdown-exec: "*"
    icechunk: "*"
  pixi_pypi_dependencies:
    mkdocs-open-in-new-tab: "*"
    mkdocs-breadcrumbs-plugin: "*"
    mkdocs-awesome-pages-plugin: "*"
    mkdocs-minify-plugin: "*"

- name: zarr
  repo: zarr-developers/zarr-python
  doc_dir: .
  html_pages_dir: site
  doc_build_cmd: "uv sync --group docs && uv run mkdocs build --no-directory-urls"
  use_own_env: true
  install: false
  generator: html2dash
