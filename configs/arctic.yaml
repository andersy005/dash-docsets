- name: xarray
  repo: pydata/xarray
  doc_dir: doc
  html_pages_dir: _build/html
  doc_build_cmd: sphinx-build -T -E -b html ./ _build/html
  pixi_dependencies:
    sphinx: ">=8,<9"
    sphinx-autosummary-accessors: "*"
    pyyaml: "*"
