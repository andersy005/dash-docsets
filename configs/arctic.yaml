- name: icechunk
  repo: earth-mover/icechunk
  doc_dir: icechunk-python/docs
  html_pages_dir: .site
  doc_build_cmd: mkdocs build
  install: false
  generator: html2dash
  pixi_dependencies:
    mkdocs: ">=1.6,<2"
    mkdocs-material: "*"
    mkdocs-redirects: "*"
    mkdocstrings: "*"
    mkdocstrings-python: "*"
    mkdocs-jupyter: "*"
    mkdocs-git-revision-date-localized-plugin: "*"
    icechunk: "*"

- name: zarr
  repo: zarr-developers/zarr-python
  doc_dir: .
  html_pages_dir: site
  doc_build_cmd: mkdocs build --no-directory-urls
  install: true
  generator: html2dash
  pixi_dependencies:
    mkdocs: ">=1.6,<2"
    mkdocs-material: ">=9.6.14"
    mkdocstrings: ">=0.29.1"
    mkdocstrings-python: ">=1.16.10"
    mkdocs-jupyter: ">=0.25.1"
    mkdocs-redirects: ">=1.2.0"
    markdown-exec: ">=1.12"
    griffe-inherited-docstrings: ">=1.1"
