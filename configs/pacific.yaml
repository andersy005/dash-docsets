- name: fastapi
  repo: tiangolo/fastapi
  doc_dir: docs/en
  doc_build_cmd: mkdocs build --no-directory-urls
  html_pages_dir: site
  generator: html2dash
- name: uvicorn
  repo: encode/uvicorn
  doc_dir: .
  doc_build_cmd: mkdocs build --no-directory-urls
  html_pages_dir: site
  generator: html2dash
- name: starlette
  repo: encode/starlette
  doc_dir: .
  doc_build_cmd: mkdocs build --no-directory-urls
  html_pages_dir: site
  generator: html2dash
- name: pydantic
  repo: samuelcolvin/pydantic
  doc_dir: .
  doc_build_cmd: mkdocs build --no-directory-urls
  html_pages_dir: site
  generator: html2dash
- name: typer
  repo: tiangolo/typer
  doc_dir: .
  doc_build_cmd: mkdocs build --no-directory-urls
  html_pages_dir: site
  generator: html2dash
- name: rich
  repo: willmcgugan/rich
  doc_dir: docs
  doc_build_cmd: sphinx-build -T -E -b html ./source build/html
  html_pages_dir: build/html
- name: pluggy
  repo: pytest-dev/pluggy
  doc_dir: docs
  html_pages_dir: _build/html
  doc_build_cmd: sphinx-build -j auto -T -E -b html ./ _build/html
