- name: fastapi
  repo: tiangolo/fastapi
  doc_dir: .
  doc_build_cmd: "uv sync --group docs && cd docs/en && uv run mkdocs build --no-directory-urls"
  html_pages_dir: docs/en/site
  generator: html2dash
  use_own_env: true
  install: false

- name: uvicorn
  repo: encode/uvicorn
  doc_dir: .
  doc_build_cmd: "uv sync --group docs && uv run mkdocs build --no-directory-urls --no-strict"
  html_pages_dir: site
  generator: html2dash
  use_own_env: true
  install: false

- name: starlette
  repo: encode/starlette
  doc_dir: .
  doc_build_cmd: "uv sync --group docs && uv run mkdocs build --no-directory-urls --no-strict"
  html_pages_dir: site
  generator: html2dash
  use_own_env: true
  install: false

- name: pydantic
  repo: pydantic/pydantic
  doc_dir: .
  doc_build_cmd: "uv sync --group docs && uv run mkdocs build --no-directory-urls --no-strict"
  html_pages_dir: site
  generator: html2dash
  use_own_env: true
  install: false

- name: typer
  repo: tiangolo/typer
  doc_dir: .
  doc_build_cmd: "uv sync --group docs && uv run mkdocs build --no-directory-urls"
  html_pages_dir: site
  generator: html2dash
