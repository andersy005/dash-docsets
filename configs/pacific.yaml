- name: fastapi
  repo: tiangolo/fastapi
  doc_dir: docs/en
  doc_build_cmd: mkdocs build --no-directory-urls
  html_pages_dir: site
  generator: html2dash
  pixi_dependencies:
    mkdocs: ">=1.6,<2"
    mkdocs-material: "*"
    mkdocs-macros-plugin: "*"
    mkdocs-redirects: "*"
    mkdocstrings: "*"
    mkdocstrings-python: "*"
    cairosvg: "*"
    pillow: "*"
    pymdown-extensions: "*"
    python-slugify: "*"
    pyyaml: "*"
    httpx: "*"
  pixi_pypi_dependencies:
    griffe-typingdoc: "*"
    griffe-warnings-deprecated: "*"
    mdx-include: "*"
    markdown-include-variants: "*"

